<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CTS Production — Device Manuals</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Exo+2:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ══════════════════════════════════════════════════════════════
     CTS PRODUCTION · UNIFIED DESIGN TOKENS (master = dashboard.html)
     Local aliases (--bg-card, --line, etc.) are mapped to the
     shared palette so manual.html matches every other page.
     ══════════════════════════════════════════════════════════════ */
  :root{
    /* Shared tokens */
    --bg:        #070B14;
    --bg2:       #0D1220;
    --bg3:       #111827;
    --card:      #131C2E;
    --border:    #1E2D45;
    --cyan:      #00D4FF;
    --cyan-dim:  #00D4FF33;
    --cyan-soft: #00D4FF55;
    --green:     #00FF88;
    --green-dim: #00FF8822;
    --amber:     #FFB800;
    --amber-dim: #FFB80022;
    --red:       #FF4466;
    --red-dim:   #FF446622;
    --text:      #E2E8F0;
    --text-dim:  #7A8BA0;
    --text-mute: #3F4A5E;
    --font-head: 'Exo 2', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --font-ui:   'Rajdhani', sans-serif;

    /* Local aliases used in manual.html — mapped to shared tokens */
    --bg-card:    var(--card);
    --bg-card-2:  var(--bg2);
    --line:       rgba(0,212,255,0.10);
    --line-2:     var(--border);
    --line-strong:rgba(0,212,255,0.32);
    --orange:     var(--amber);
    --pink:       var(--red);
    --muted:      var(--text-dim);
    --muted-2:    var(--text-mute);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-ui),'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{
    min-height:100vh;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px),
      radial-gradient(1200px 600px at 90% -10%, rgba(0,212,255,0.06), transparent 60%);
    background-size: 40px 40px, 40px 40px, 100% 100%;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
  }
  a{color:inherit;text-decoration:none}
  button{font-family:inherit}
  .mono{font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;letter-spacing:0.04em}

  .shell{max-width:1280px;margin:0 auto;padding:20px 28px 64px;position:relative}

  /* TOP HEADER (matches dashboard) */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;gap:16px;
    padding:6px 0 22px;
  }
  .brand{display:flex;align-items:center;gap:14px}
  .brand .logo{
    width:44px;height:44px;border-radius:10px;overflow:hidden;display:grid;place-items:center;
    background:#0B1220;
    box-shadow: 0 0 0 1px rgba(0,224,255,0.45), 0 8px 24px rgba(0,224,255,0.20);
  }
  .brand .logo img{width:100%;height:100%;object-fit:contain;display:block}
  .brand .ttl{display:flex;flex-direction:column;gap:2px}
  .brand .ttl h1{margin:0;font-size:22px;font-weight:700;letter-spacing:-0.01em;color:var(--text)}
  .brand .ttl .sub{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--muted);letter-spacing:.22em;text-transform:uppercase}

  .top-right{display:flex;align-items:center;gap:12px}
  .back{
    display:inline-flex;align-items:center;gap:8px;
    border:1px solid var(--line-2);border-radius:999px;
    padding:8px 14px;color:var(--text-dim);
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;
    transition:all .18s ease;background:transparent;cursor:pointer;
  }
  .back:hover{color:var(--cyan);border-color:var(--cyan)}
  .live-pill{
    display:inline-flex;align-items:center;gap:8px;color:var(--green);
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;font-weight:600;
  }
  .live-pill .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}

  /* SECTION TABS — pills like dashboard */
  .tabs{
    display:flex;justify-content:center;gap:8px;
    padding:8px 0 24px;flex-wrap:wrap;
  }
  .tab{
    border:1px solid var(--cyan);color:var(--cyan);background:transparent;
    padding:11px 26px;border-radius:999px;cursor:pointer;
    font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;
    transition:all .18s ease;
  }
  .tab:hover{background:rgba(0,224,255,0.10)}
  .tab.active{background:var(--cyan);color:var(--bg);box-shadow:0 0 0 4px rgba(0,224,255,0.12), 0 0 24px rgba(0,224,255,0.30)}

  /* SUB-TABS — secondary pills (Energy Eye GSM / AC Eye style) */
  .subtabs{
    display:flex;gap:10px;padding:0 0 18px;flex-wrap:wrap;
    border-bottom:1px solid var(--line);margin-bottom:24px;
  }
  .subtab{
    border:1px solid var(--line-2);color:var(--text-dim);background:transparent;
    padding:7px 16px;border-radius:8px;cursor:pointer;
    font-family:'JetBrains Mono',monospace;font-size:11.5px;letter-spacing:.10em;
    transition:all .18s ease;
  }
  .subtab:hover{color:var(--cyan);border-color:var(--cyan-soft)}
  .subtab.active{color:var(--cyan);border-color:var(--cyan);background:rgba(0,224,255,0.04)}

  /* SECTION TITLE (◆ heading like dashboard) */
  .stitle{
    display:flex;align-items:center;gap:10px;margin:0 0 18px;
    font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--cyan);letter-spacing:.16em;text-transform:uppercase;font-weight:600;
  }
  .stitle::before{content:"◆";color:var(--cyan);font-size:10px;transform:translateY(-1px)}
  .stitle .l{color:var(--text-dim)}

  /* CARD — base style matching dashboard */
  .card{
    background:var(--bg-card);
    border:1px solid var(--line-2);
    border-radius:14px;
    padding:24px;
    transition:border-color .2s ease;
  }
  .card:hover{border-color:var(--line-strong)}

  /* METRIC CARDS row — like 21% / 2,508 / 9,392 */
  .metrics{
    display:grid;grid-template-columns:repeat(3, 1fr);gap:14px;margin-bottom:14px;
  }
  @media (max-width: 760px){.metrics{grid-template-columns:1fr}}
  .metric{
    background:var(--bg-card);border:1px solid var(--line-2);border-radius:14px;
    padding:24px 28px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
    min-height:110px;
  }
  .metric .v{font-family:var(--font-head);font-size:38px;font-weight:700;line-height:1;letter-spacing:-0.02em}
  .metric .k{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.20em;text-transform:uppercase}
  .metric.cyan .v{color:var(--cyan)}
  .metric.green .v{color:var(--green)}
  .metric.orange .v{color:var(--orange)}
  .metric.pink .v{color:var(--pink)}

  .metrics-2{
    display:grid;grid-template-columns:1fr 2fr;gap:14px;margin-bottom:28px;
  }
  @media (max-width: 760px){.metrics-2{grid-template-columns:1fr}}

  /* HERO panel — main device card */
  .hero{
    display:grid;grid-template-columns:1fr;gap:14px;margin-bottom:28px;
  }

  .hero-l{
    background:var(--bg-card);border:1px solid var(--line-2);border-radius:14px;
    padding:28px;display:flex;flex-direction:column;gap:14px;
  }
  .hero-l .pill{
    align-self:flex-start;
    display:inline-flex;align-items:center;gap:8px;
    border:1px solid var(--cyan-soft);border-radius:999px;
    padding:5px 12px;background:rgba(0,224,255,0.04);
    font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--cyan);letter-spacing:.16em;text-transform:uppercase;
  }
  .hero-l .pill .dt{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
  .hero-l h2{
    margin:6px 0 0;font-size:38px;font-weight:700;line-height:1.02;letter-spacing:-0.02em;color:var(--text);
  }
  .hero-l .lede{margin:0;font-size:14.5px;line-height:1.6;color:var(--text-dim)}

  .hero-actions{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
  .btn-primary{
    display:inline-flex;align-items:center;gap:10px;
    background:var(--cyan);color:var(--bg);border:1px solid var(--cyan);border-radius:10px;
    padding:13px 22px;cursor:pointer;
    font-family:'JetBrains Mono',monospace;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;
    transition:all .18s ease;
    box-shadow:0 0 0 4px rgba(0,224,255,0.10);
  }
  .btn-primary:hover{background:#5DEBFF;border-color:#5DEBFF;transform:translateY(-1px);box-shadow:0 0 0 4px rgba(0,224,255,0.18), 0 8px 24px rgba(0,224,255,0.30)}
  .btn-primary svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

  .btn-outline{
    display:inline-flex;align-items:center;gap:10px;
    background:transparent;color:var(--cyan);border:1px solid var(--cyan);border-radius:10px;
    padding:13px 22px;cursor:pointer;
    font-family:'JetBrains Mono',monospace;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;
    transition:all .18s ease;
  }
  .btn-outline:hover{background:rgba(0,224,255,0.08)}
  .btn-outline svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

  .hero-meta{
    margin-top:14px;padding-top:18px;border-top:1px solid var(--line);
    display:grid;grid-template-columns:repeat(4, minmax(0,1fr));gap:14px;
  }
  @media (max-width: 760px){.hero-meta{grid-template-columns:repeat(2,1fr)}}
  .hm{display:flex;flex-direction:column;gap:4px}
  .hm .k{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.18em;text-transform:uppercase}
  .hm .v{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text);letter-spacing:.03em}
  .hm .v b{color:var(--cyan);font-weight:600}

  /* HERO RIGHT — schematic preview */
  .hero-r{
    background:var(--bg-card);border:1px solid var(--line-2);border-radius:14px;
    padding:24px;display:flex;flex-direction:column;gap:14px;align-items:center;justify-content:center;
    min-height:280px;position:relative;overflow:hidden;
  }
  .hero-r::before{
    content:"";position:absolute;inset:0;background:radial-gradient(closest-side, rgba(0,224,255,0.08), transparent 70%);pointer-events:none;
  }
  .device-tag{
    font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--cyan);letter-spacing:.18em;text-transform:uppercase;
    border:1px solid var(--cyan-soft);padding:5px 14px;border-radius:999px;background:rgba(0,224,255,0.04);
    position:relative;z-index:1;
  }
  .schematic{width:100%;max-width:280px;aspect-ratio:1/1;position:relative;z-index:1}
  .schematic svg{width:100%;height:100%}
  .schematic .lbl{
    position:absolute;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--cyan);letter-spacing:.10em;text-transform:uppercase;
    background:rgba(5,11,20,0.92);border:1px solid var(--cyan-soft);padding:3px 8px;border-radius:4px;
  }

  /* CHAPTER GRID */
  .chapters{
    display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-bottom:28px;
  }
  @media (max-width: 980px){.chapters{grid-template-columns:repeat(2,1fr)}}
  @media (max-width: 600px){.chapters{grid-template-columns:1fr}}

  .ch{
    background:var(--bg-card);border:1px solid var(--line-2);border-radius:14px;
    padding:22px;cursor:pointer;display:flex;flex-direction:column;gap:10px;min-height:170px;
    transition:all .2s ease;text-align:left;
  }
  .ch:hover{border-color:var(--cyan);transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,224,255,0.08)}
  .ch-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .ch-num{
    font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--muted);letter-spacing:.16em;text-transform:uppercase;
  }
  .ch-num b{color:var(--cyan)}
  .ch-pg{
    font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--cyan);letter-spacing:.12em;text-transform:uppercase;
    display:inline-flex;align-items:center;gap:6px;
    background:rgba(0,224,255,0.06);border:1px solid var(--line-2);padding:3px 9px;border-radius:6px;
  }
  .ch h3{margin:4px 0 0;font-size:17px;font-weight:600;color:var(--text);letter-spacing:-0.005em}
  .ch p{margin:0;font-size:13px;line-height:1.55;color:var(--text-dim)}
  .ch-foot{
    margin-top:auto;padding-top:10px;
    font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--cyan);letter-spacing:.14em;text-transform:uppercase;
    display:flex;align-items:center;justify-content:space-between;
  }
  .ch-foot .arr{transition:transform .18s ease;display:inline-block}
  .ch:hover .ch-foot .arr{transform:translateX(4px)}
  .ch-status{display:flex;align-items:center;gap:6px;color:var(--green);font-size:10px}
  .ch-status .dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}

  /* TWO-PANEL: WORKFLOW + COMMANDS */
  .split{
    display:grid;grid-template-columns:1.1fr 1fr;gap:14px;margin-bottom:28px;
  }
  @media (max-width: 900px){.split{grid-template-columns:1fr}}
  .panel{
    background:var(--bg-card);border:1px solid var(--line-2);border-radius:14px;padding:24px;
  }
  .panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
  .panel-head h3{margin:0;font-size:15px;font-weight:600;color:var(--text);letter-spacing:-0.005em}
  .panel-head .tg{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--muted);letter-spacing:.16em;text-transform:uppercase}

  /* Workflow steps */
  .steps{display:flex;flex-direction:column;position:relative}
  .steps::before{content:"";position:absolute;left:17px;top:22px;bottom:22px;width:1px;background:linear-gradient(180deg, var(--cyan-soft), transparent)}
  .step{display:flex;gap:14px;padding:10px 0;position:relative}
  .step .n{
    width:34px;height:34px;border-radius:50%;border:1px solid var(--cyan-soft);
    background:var(--bg);color:var(--cyan);flex-shrink:0;z-index:1;
    display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;
    transition:all .18s ease;
  }
  .step:hover .n{background:var(--cyan);color:var(--bg);box-shadow:0 0 0 4px rgba(0,224,255,0.16)}
  .step .b{flex:1;min-width:0;padding-top:6px}
  .step .b .t{font-size:14px;color:var(--text);font-weight:500;margin-bottom:2px}
  .step .b .d{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}

  /* Commands */
  .cmds{display:flex;flex-direction:column;gap:8px}
  .cmd{
    display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;
    padding:11px 14px;border:1px solid var(--line-2);border-radius:8px;
    background:var(--bg2);cursor:pointer;transition:all .18s ease;
  }
  .cmd:hover{border-color:var(--cyan-soft);background:rgba(0,224,255,0.04)}
  .cmd code{font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--cyan);letter-spacing:.04em}
  .cmd code .arg{color:var(--text-dim)}
  .cmd .desc{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;text-align:right}

  /* SPECS TABLE */
  .specs{
    background:var(--bg-card);border:1px solid var(--line-2);border-radius:14px;overflow:hidden;margin-bottom:28px;
    display:grid;grid-template-columns:repeat(2, minmax(0,1fr));
  }
  @media (max-width: 760px){.specs{grid-template-columns:1fr}}
  .specs .row{
    display:grid;grid-template-columns:1.2fr 1fr;gap:12px;padding:14px 22px;
    border-bottom:1px solid var(--line);align-items:center;
  }
  .specs .row .k{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase}
  .specs .row .v{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text);letter-spacing:.03em}
  .specs .row .v b{color:var(--cyan);font-weight:600}

  /* SAFETY */
  .safety{
    margin-bottom:28px;padding:18px 22px;
    border:1px solid rgba(255,107,154,0.30);border-radius:12px;
    background:linear-gradient(90deg, rgba(255,107,154,0.06), transparent);
    display:flex;gap:14px;align-items:flex-start;
  }
  .safety .ic{
    width:32px;height:32px;border-radius:8px;flex-shrink:0;display:grid;place-items:center;
    background:rgba(255,107,154,0.12);border:1px solid rgba(255,107,154,0.4);color:var(--pink);
  }
  .safety .ic svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
  .safety .body .lbl{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--pink);letter-spacing:.18em;text-transform:uppercase;margin-bottom:4px}
  .safety .body p{margin:0;font-size:13px;line-height:1.55;color:var(--text-dim)}

  /* DOWNLOAD CARD */
  .dl-card{
    background:linear-gradient(135deg, rgba(0,224,255,0.10), rgba(0,224,255,0.02) 60%), var(--bg-card);
    border:1px solid var(--cyan);border-radius:14px;padding:24px;
    display:grid;grid-template-columns:auto 1fr auto;gap:22px;align-items:center;margin-bottom:28px;
    box-shadow:0 0 0 4px rgba(0,224,255,0.06);
  }
  @media (max-width: 760px){.dl-card{grid-template-columns:1fr;text-align:center}.dl-card .dl-cover{margin:0 auto}}
  .dl-cover{
    width:78px;height:100px;border:1px solid var(--cyan);border-radius:6px;
    background:linear-gradient(180deg, rgba(0,224,255,0.20), rgba(0,224,255,0.02));
    position:relative;display:flex;flex-direction:column;justify-content:space-between;padding:9px;
    box-shadow:0 8px 26px rgba(0,224,255,0.18);
  }
  .dl-cover::before{
    content:"";position:absolute;left:9px;right:9px;top:34px;height:2px;background:rgba(0,224,255,0.45);
    box-shadow:0 4px 0 rgba(0,224,255,0.45), 0 8px 0 rgba(0,224,255,0.45), 0 12px 0 rgba(0,224,255,0.45), 0 16px 0 rgba(0,224,255,0.45), 0 20px 0 rgba(0,224,255,0.45), 0 24px 0 rgba(0,224,255,0.45), 0 28px 0 rgba(0,224,255,0.30);
  }
  .dl-cover .tl{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--cyan);letter-spacing:.12em}
  .dl-cover .no{font-family:'JetBrains Mono',monospace;font-size:7.5px;color:var(--cyan);letter-spacing:.12em;align-self:flex-end}
  .dl-body .k{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--cyan);letter-spacing:.18em;text-transform:uppercase;margin-bottom:4px}
  .dl-body h3{margin:0;font-size:20px;font-weight:600;letter-spacing:-0.005em}
  .dl-body p{margin:6px 0 10px;color:var(--text-dim);font-size:13px;line-height:1.5}
  .dl-body .meta{display:flex;gap:14px;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--muted);letter-spacing:.10em;text-transform:uppercase;flex-wrap:wrap}
  .dl-body .meta b{color:var(--text);font-weight:500}

  /* FOOTER */
  .footer{
    margin-top:28px;padding:24px;border:1px solid var(--line-2);border-radius:14px;background:var(--bg-card);
    display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:24px;
  }
  @media (max-width: 760px){.footer{grid-template-columns:1fr}}
  .foot-brand{display:flex;align-items:flex-start;gap:14px}
  .foot-brand .lg{
    width:40px;height:40px;border-radius:9px;flex-shrink:0;
    display:grid;place-items:center;overflow:hidden;background:#0B1220;
    box-shadow:0 0 0 1px rgba(0,224,255,0.4);
  }
  .foot-brand .lg img{width:100%;height:100%;object-fit:contain;display:block}
  .foot-brand .ft{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.06em;line-height:1.6}
  .foot-brand .ft .co{color:var(--text);text-transform:uppercase;letter-spacing:.14em;font-weight:600;margin-bottom:4px;display:block;font-size:11px}

  .foot-col{display:flex;flex-direction:column;gap:8px}
  .foot-col .h{
    font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--cyan);letter-spacing:.20em;text-transform:uppercase;
    margin-bottom:6px;
  }
  .foot-col a{
    font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--text-dim);letter-spacing:.06em;
    transition:color .18s ease;
  }
  .foot-col a:hover{color:var(--cyan)}

  .signoff{
    grid-column:1/-1;margin-top:14px;padding-top:16px;border-top:1px solid var(--line);
    display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;
    font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--muted);letter-spacing:.10em;text-transform:uppercase;
  }
  .signoff .seq{color:var(--muted-2)}

  /* PDF VIEWER MODAL */
  .viewer{
    position:fixed;inset:0;z-index:100;
    background:rgba(5,11,20,0.92);backdrop-filter:blur(8px);
    display:none;align-items:center;justify-content:center;padding:24px;
  }
  .viewer.open{display:flex}
  .viewer-inner{
    position:relative;width:100%;max-width:1100px;height:calc(100vh - 48px);
    background:var(--bg-card);border:1px solid var(--cyan);border-radius:14px;
    box-shadow:0 30px 80px rgba(0,224,255,0.30);
    display:flex;flex-direction:column;overflow:hidden;
  }
  .viewer-head{
    display:flex;align-items:center;justify-content:space-between;gap:14px;
    padding:14px 18px;border-bottom:1px solid var(--line-2);
    background:linear-gradient(180deg, rgba(0,224,255,0.06), transparent);
  }
  .viewer-head .ttl{display:flex;align-items:center;gap:12px;min-width:0}
  .viewer-head .ic{
    width:28px;height:28px;border-radius:6px;border:1px solid var(--cyan-soft);
    background:rgba(0,224,255,0.10);color:var(--cyan);display:grid;place-items:center;flex-shrink:0;
  }
  .viewer-head .ic svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
  .viewer-head h4{margin:0;font-size:14px;font-weight:600;letter-spacing:-0.005em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .viewer-head .sub{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
  .viewer-head .actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
  .viewer-head .v-btn{
    background:transparent;border:1px solid var(--line-2);color:var(--text-dim);
    padding:8px 12px;border-radius:6px;cursor:pointer;
    font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;
    transition:all .18s ease;display:inline-flex;align-items:center;gap:8px;
  }
  .viewer-head .v-btn:hover{color:var(--cyan);border-color:var(--cyan)}
  .viewer-head .v-btn.primary{color:var(--cyan);border-color:var(--cyan);background:rgba(0,224,255,0.06)}
  .viewer-head .v-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
  .viewer-frame{flex:1;background:#0a0e18;overflow:auto;padding:18px 0}
  .viewer-frame .pages{display:flex;flex-direction:column;align-items:center;gap:14px}
  .viewer-frame canvas{max-width:calc(100% - 24px);height:auto;display:block;box-shadow:0 8px 24px rgba(0,0,0,0.4);border-radius:4px}
  .viewer-frame .loading{color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:60px 20px;text-align:center}
  .viewer-frame .loading .bar{width:200px;height:2px;background:var(--line-2);margin:14px auto 0;border-radius:2px;overflow:hidden}
  .viewer-frame .loading .bar i{display:block;height:100%;background:var(--cyan);width:0;transition:width .2s ease}
  .viewer-foot{
    padding:8px 18px;border-top:1px solid var(--line-2);
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--muted);letter-spacing:.10em;text-transform:uppercase;
  }

  /* TOAST */
  .toast{
    position:fixed;left:50%;bottom:32px;transform:translate(-50%, 20px);
    background:rgba(5,11,20,0.95);border:1px solid var(--cyan);border-radius:10px;
    padding:13px 18px;display:flex;align-items:center;gap:12px;
    font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text);letter-spacing:.05em;
    box-shadow:0 18px 50px rgba(0,224,255,0.20);
    opacity:0;pointer-events:none;transition:all .25s ease;z-index:200;
  }
  .toast.show{opacity:1;transform:translate(-50%,0);pointer-events:auto}
  .toast .ic{width:18px;height:18px;color:var(--cyan)}
  .toast .ic svg{width:100%;height:100%;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
  .toast .clo{color:var(--muted);cursor:pointer;margin-left:6px;font-size:11px}
  .toast .clo:hover{color:var(--cyan)}

  /* MOBILE TWEAKS */
  @media (max-width: 600px){
    .shell{padding:14px 16px 48px}
    .brand .ttl h1{font-size:18px}
    .hero-l h2{font-size:30px}
    .metric{padding:18px 16px;min-height:90px}
    .metric .v{font-size:30px}
    .dl-card{padding:18px}
    .viewer{padding:0}
    .viewer-inner{height:100vh;border-radius:0;border-width:0}
    .viewer-head{flex-wrap:wrap;gap:10px}
    .viewer-head .actions{order:3;width:100%;justify-content:flex-end}
  }




/* ── LIGHT MODE (matches dashboard) ── */
body.light-mode{
  --bg:        #F0FDFA;
  --bg2:       #CCFBF1;
  --bg3:       #99F6E4;
  --card:      #FFFFFF;
  --border:    #5EEAD4;
  --cyan:      #0D9488;
  --cyan-dim:  #CCFBF1;
  --cyan-soft: #0D948888;
  --green:     #16A34A;
  --green-dim: #DCFCE7;
  --amber:     #F59E0B;
  --amber-dim: #FEF9C3;
  --red:       #EF4444;
  --red-dim:   #FEE2E2;
  --text:      #134E4A;
  --text-dim:  #0F766E;
  --text-mute: #5EEAD4;
  /* Local aliases re-map under light */
  --bg-card:    #FFFFFF;
  --bg-card-2:  #CCFBF1;
  --line:       rgba(13,148,136,0.10);
  --line-2:     #5EEAD4;
  --line-strong:rgba(13,148,136,0.32);
  --orange:     #F59E0B;
  --pink:       #EF4444;
  --muted:      #0F766E;
  --muted-2:    #5EEAD4;
}
body.light-mode .tbl,
body.light-mode .scard,
body.light-mode .modal,
body.light-mode .setting-group,
body.light-mode .card,
body.light-mode .panel,
body.light-mode .metric,
body.light-mode .hero-l,
body.light-mode .hero-r,
body.light-mode .specs,
body.light-mode .ch,
body.light-mode .footer,
body.light-mode .ucard{background:#FFFFFF;border-color:#5EEAD4}
body.light-mode .tbl-head{background:rgba(13,148,136,0.08)}
body.light-mode .tbl-row:hover{background:rgba(13,148,136,0.04)}
body.light-mode .tab.active{background:#0D9488;color:#fff;box-shadow:none}
body.light-mode .tab{border-color:#0D9488;color:#0D9488}
body.light-mode input,body.light-mode select,body.light-mode textarea{background:#F0FDFA;border-color:#5EEAD4;color:#134E4A}
body.light-mode .cmd{background:#F0FDFA;border-color:#5EEAD4;}
body.light-mode .cmd:hover{background:#CCFBF1;border-color:#0D9488;}
body.light-mode .cmd code{color:#0D9488;}
body.light-mode .cmd code .arg{color:#0F766E;}
body.light-mode .cmd .desc{color:#0F766E;}
body.light-mode .safety{background:#FEF9C3;border-color:#F59E0B;}
body.light-mode .safety .lbl{color:#92400E;}
body.light-mode .safety p{color:#78350F;}
body.light-mode{
  background-color:#F0FDFA;
  background-image:
    linear-gradient(rgba(13,148,136,0.08) 1px,transparent 1px),
    linear-gradient(90deg,rgba(13,148,136,0.08) 1px,transparent 1px),
    radial-gradient(ellipse 100% 50% at 50% 0%,rgba(13,148,136,0.10),transparent 60%);
  background-size:40px 40px,40px 40px,100% 100%;
}

/* ── TOUCH TARGETS (min 44×44 on touch devices) ── */
@media(pointer:coarse){
  .tab,.subtab,.btn-primary,.btn-outline,.back,.v-btn,.ch{min-height:44px}
}


/* ── OVERFLOW FIX ── */
html{overflow-x:hidden}
body{overflow-x:hidden}
img,svg,table{max-width:100%}


@media(max-width:480px){
  .logo-wrap img, .logo{width:32px!important;height:32px!important}
  table{font-size:11px}
  td,th{padding:5px 6px!important}
}

/* ── BACK TO TOP (CTS style) ── */
.back-to-top{
  position:fixed;
  right:max(20px, env(safe-area-inset-right));
  bottom:max(20px, env(safe-area-inset-bottom));
  z-index:90;
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  min-width:44px;min-height:44px;
  padding:10px 14px;border-radius:12px;
  background:rgba(13,18,32,0.92);
  border:1px solid var(--cyan);
  color:var(--cyan);
  font-family:'JetBrains Mono',monospace;
  font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  cursor:pointer;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  box-shadow:0 8px 24px rgba(0,212,255,0.18), 0 0 0 1px rgba(0,212,255,0.08);
  opacity:0;visibility:hidden;transform:translateY(12px);
  transition:opacity .25s ease, transform .25s ease, visibility .25s ease, background .15s ease, border-color .15s ease;
  -webkit-tap-highlight-color:transparent;
}
.back-to-top.show{opacity:1;visibility:visible;transform:translateY(0)}
.back-to-top:hover{background:rgba(0,212,255,0.12);border-color:#5DEBFF;color:#5DEBFF;box-shadow:0 10px 30px rgba(0,212,255,0.32)}
.back-to-top:active{transform:translateY(0) scale(0.96)}
.back-to-top .arr{font-size:14px;line-height:1;display:inline-block;transition:transform .2s ease}
.back-to-top:hover .arr{transform:translateY(-2px)}
body.light-mode .back-to-top{background:rgba(255,255,255,0.96);border-color:#0D9488;color:#0D9488;box-shadow:0 8px 24px rgba(13,148,136,0.18)}
body.light-mode .back-to-top:hover{background:#CCFBF1;border-color:#0F766E;color:#0F766E}
@media(max-width:480px){
  .back-to-top{padding:0;min-width:48px;min-height:48px;border-radius:50%;font-size:0;gap:0}
  .back-to-top .lbl{display:none}
  .back-to-top .arr{font-size:18px}
}

// Device definitions — static metadata
var DEVICES = [
  { code:'dod', name:'Defrost on Demand', desc:'Master/slave defrost controller. Initiates defrost cycles only when airflow drops — preventing ice buildup on evaporator coils.', tags:['Modbus RTU','220 VAC / 24 VDC','1.4 MB'], url:'manual-dod.pdf' },

function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderDevices(manuals){
  const grid = document.getElementById('device-grid');
  const countEl = document.getElementById('device-count');
  let enabled = 0;
  grid.innerHTML = DEVICES.map(d => {
    const m = (manuals && manuals[d.code]) || {};
    const isEnabled = m.enabled !== false && (d.code === 'dod' ? true : m.enabled === true);
    if(isEnabled) enabled++;
    const badge = isEnabled
      ? '<span class="device-badge badge-live"><span class="badge-dot"></span>Available</span>'
      : '<span class="device-badge badge-soon"><span class="badge-dot"></span>Coming Soon</span>';
    const tags = d.tags.map(t=>`<span class="device-tag">${escH(t)}</span>`).join('');
    if(isEnabled){
      return `<a class="device-card" href="${escH(d.url)}" target="_blank" rel="noopener">
        <span class="device-arrow">→</span>
        ${badge}
        <div class="device-name">${escH(d.name)}</div>
        <div class="device-desc">${escH(d.desc)}</div>
        <div class="device-meta">${tags}</div>
      </a>`;

      return `<div class="device-card disabled">
        ${badge}
        <div class="device-name">${escH(d.name)}</div>
        <div class="device-desc">${escH(d.desc)}</div>
        <div class="device-meta">${tags}</div>
      </div>`;
    }
  }).join('');
  if(countEl) countEl.textContent = enabled + ' of ' + DEVICES.length + ' available';
}

  if(!_db){ renderDevices(null); loadTechLinks(null); return; }
  _db.collection('cts').doc('state').onSnapshot(snap=>{

    renderDevices(data.manuals||{});
  },()=>renderDevices(null));
}

<script>
(function(){
  var btn = document.getElementById('backToTop');
  if(!btn) return;
  var ticking = false;
  function update(){
    if(window.pageYOffset > 300){ btn.classList.add('show'); }
    else { btn.classList.remove('show'); }
    ticking = false;
  }
  function onScroll(){
    if(!ticking){ window.requestAnimationFrame(update); ticking = true; }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  btn.addEventListener('click', function(){
    try { window.scrollTo({ top: 0, behavior: 'smooth' }); }
    catch(e){ window.scrollTo(0, 0); }
  });
  update();
})();

  const isSup   = finalRole==='supervisor';

  // Show correct nav section
  document.getElementById('snav-staff-links').style.display = isGuest?'none':'';
  document.getElementById('snav-guest-links').style.display = isGuest?'':'none';

  // Role-specific links
  const inv = document.getElementById('snav-inventory');
  const adm = document.getElementById('snav-admin');
  const logout = document.getElementById('snav-logout');
  if(inv) inv.style.display = (isAdmin||isSup)?'':'none';
  if(adm) adm.style.display = isAdmin?'':'none';
  if(logout) logout.style.display = isGuest?'none':'';

  // Avatar
  const av = document.getElementById('snav-avatar');
  const un = document.getElementById('snav-uname');
  const ur = document.getElementById('snav-urole');
  if(isGuest){
    if(av){ av.textContent='GU'; av.className='snav-avatar'; }
    if(un) un.textContent='Guest';
    if(ur) ur.textContent='Visitor / Customer';
  } else {
    const initials = finalName.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase()||'?';
    if(av){ av.textContent=initials; av.className='snav-avatar staff'; }
    if(un) un.textContent=finalName||finalRole;
    if(ur) ur.textContent=isAdmin?'Administrator':isSup?'Supervisor':'Worker';
  }
}
window.addEventListener('DOMContentLoaded', initNav);
</script>
</body>
</html>
